version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      # - GEMINI_API_KEY=${GEMINI_API_KEY} # Passed from host if needed
    networks:
      - arena_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    networks:
      - arena_network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  arena_network:
    driver: bridge
