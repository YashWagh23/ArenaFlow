name: ArenaFlow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Backend
        run: npm run build --workspace=backend
        
      - name: Typecheck & Build Frontend
        run: npm run build --workspace=frontend

      # We don't have explicit lint/unit scripts defined in package.json at root, 
      # but if they existed, we'd run them here. Using test:e2e as the main gate.
      # Assuming shared has tests or we just build it
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        # We start the backend and frontend, then run tests
        # We can use wait-on to wait for ports, but Playwright webServer config is better
        # For this setup, we'll run them in the background
        run: |
          npm run start --workspace=backend &
          npm run preview --workspace=frontend -- --port 5173 &
          npx wait-on http://localhost:5000/health
          npx wait-on http://localhost:5173
          npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
